services:
  postgres:
    image: postgres:17-alpine
    container_name: pts-postgres
    environment:
      POSTGRES_USER: pelicantown
      POSTGRES_PASSWORD: pelicantown
      POSTGRES_DB: pelicantown
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pelicantown"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pts-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: pts-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pelicantown
      RABBITMQ_DEFAULT_PASS: pelicantown
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: pts-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pts-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  seq_data:
